[project]
name = "pocket-agent"
version = "0.1.0"
description = "Foundations-first LangGraph build (generated by scripts/build_pocket_agent.sh)"
requires-python = ">=3.10"
dependencies = [
  "langgraph>=1.2",
  "langchain>=1.0",
  "langgraph-checkpoint-sqlite",
]

[project.optional-dependencies]
dev = ["pytest"]
anthropic = ["langchain-anthropic"]
openai = ["langchain-openai"]
ollama = ["langchain-ollama"]
server = ["langgraph-cli[inmem]"]
postgres = ["psycopg[binary,pool]", "langgraph-checkpoint-postgres"]

[tool.setuptools.packages.find]
include = ["pocket_agent*", "alt_create_agent*"]
